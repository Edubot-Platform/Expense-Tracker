  <body>

    <div class="header">

        <p class="m-0">Expense<br>Tracker

        <img src="./moneygoing.jpg" alt="" width="35px">

        </p>

    </div>



  <div class="input-form">



    <div class="form-floating inputs ">

  <!-- <input type="date" class="form-control dateInput" id="floatingInput" placeholder="name@example.com"> -->

  <input type="date" class="form-control dateInput" id="dateInput" placeholder="name@example.com"> 

  <!-- <label for="floatingInput">Date</label> -->
   <label for="dateInput">Date</label>

</div>

    <div class="form-floating inputs ">

  <!-- <input type="number" class="form-control amountInput" id="floatingInput" placeholder="name@example.com"> -->

  <input type="number" class="form-control amountInput" id="amountInput" placeholder="name@example.com">

  <!-- <label for="floatingInput">Amount</label> -->
   <label for="amountInput">Amount</label>

</div>

<select class="form-select inputs transcationType " aria-label="Default select example ">

  <option selected>Transcation Type</option>

  <option value="Income">Income</option>

  <option value="Expense">Expense</option>

</select>
<button type="button" class="btn" id="add-button" onclick="addRow()">+</button>

 <!-- <button class="btn" id="add-button" onclick="printValues()">+</button>  -->

  </div>


  <div class="cards mt-4">


    <div class="card" >
  <div class="card-body">
    <h5 class="card-title m-0">Total Income
    <img src="./wallet.jpg" alt="" width="35px">
    </h5>
    <h1 class="m-0">
      <img src="./rupee.jpg" alt="" width="35px">
      <span id="totalIncome" class="m-0" >0 </span>
    </h1>
    
  </div>
</div>
    
<div class="card" >
  <div class="card-body">
    <h5 class="card-title m-0">Total Expense
    <img src="./expensesmoney.jpg" alt="" width="40px">
    </h5>
    <h1 class="m-0">
      <img src="./rupee.jpg" alt="" width="35px">
      <span id="expense" class="m-0" >0 </span>
    </h1>
    
  </div>
</div>


<div class="card">
  <div class="card-body">
    <h5 class="card-title m-0">Balance
    <img src="./balance.jpg" alt="" width="35px">
    </h5>
    <h1 class="m-0">
      <img src="./rupee.jpg" alt="" width="35px">
      <span id="balance" class="m-0" >0 </span>
    </h1>
    
  </div>
</div>
</div>

<table class="transcation-table mt-3" id="table">
  <tr id="header-row">
    <th>Amount</th>
    <th>Transcation Type</th>
    <th>Transcation Date</th>
    <th>Action</th>
  </tr>
  <!-- <tr>
    <td>10,499</td>
    <td>Income</td>
    <td>30-01-2025</td>
    <td><button class="btn btn-md delete-button">
      <img src="./dustbin.jpg" alt="" width="35px"> 
    </button>
  </td>
  </tr> -->

  
</table>
<script>
  let table=document.getElementById('table')
  console.log("Table",table);

  function deleteRow(row)
  {
    
     console.log(row);
     row.remove();
     
  }







  function addRow()
  {
    alert("Function is working");

    let date = document.getElementsByClassName('dateInput')[0].value;
    let amount = document.getElementsByClassName('amountInput')[0].value;
    let transcationType = document.getElementsByClassName('transcationType')[0].value;


    if(date=="" || amount=="" || transcationType=="Transcation Type")
    {
        alert("Please fill all the fields");
        return;
    }
  

    let row=document.createElement('tr')
    let amountcell=document.createElement('td')

    amountcell.innerText=amount;

    let trascationcell=document.createElement('td')
    trascationcell.innerText=transcationType;

    let datecell=document.createElement('td')
    datecell.innerText=date;
    
    let binCell=document.createElement('td')
    let deleteButton=document.createElement('button')
    let binImage=document.createElement('img')
    binImage.src='./dustbin.jpg'
    binImage.style.width='50px'
    binImage.style.height='50px'


    deleteButton.appendChild(binImage)
    deleteButton.classList.add('delete-button')
     deleteButton.onclick=()=>deleteRow(row)



    // deleteButton.innerText="Delete"

    binCell.appendChild(deleteButton);



    row.appendChild(amountcell)
    row.appendChild(trascationcell)
    row.appendChild(datecell)
    row.appendChild(binCell)


    table.appendChild(row)
    let totalIncome=document.getElementById('totalIncome').innerText
    let totalExpense=document.getElementById('expense').innerText
    let balance=document.getElementById('balance').innerText
    if(transcationType=='Income')
    {
        if(totalIncome=='0'){
          document.getElementById('totalIncome').innerText=amount
        }
        else
        {
          document.getElementById('totalIncome').innerText=parseInt(totalIncome)+parseInt(amount)
        }
        if(balance=="0")
        {
          document.getElementById('balance').innerText=amount
        }
        else
        {
          document.getElementById('balance').innerText=parseInt(balance)+parseInt(amount)
        }
    }
    else if(transcationType=="Expense")
    {
       if(totalExpense=="0")
       {
        document.getElementById('expense').innerText=amount
       }
        else
        {
            document.getElementById('expense').innerText=parseInt(totalExpense)+parseInt(amount)
        }
        if(balance=="0")
        {
          document.getElementById('balance').innerText=amount
        }
        else
        {
          document.getElementById('balance').innerText=parseInt(balance)-parseInt(amount)
        }
    }
  

    console.log('Line 145:',totalIncome,totalExpense,balance)



    console.log('Line 124:',amountcell,trascationcell,datecell)





    console.log("Line 109:", date, amount, transcationType);
  }
</script>
